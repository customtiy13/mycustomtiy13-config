
########################################################################################
#AUTOGENERATED HYPR CONFIG.
#PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
#OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
########################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#
ecosystem:no_update_news = true

#autogenerated = 0 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=HDMI-A-1,1920x1080@60, 2080x180, 1
# monitor=DP-1, 3840x2160, 4000x0, 1.5

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = HYPRCURSOR_THEME, Bibata-Modern-Amber
env = HYPRCURSOR_SIZE, 34
#rose-pine-hyprcursorenv = XCURSOR_SIZE, rose-pine-hyprcursor
env = XCURSOR_SIZE, 34
env = XCURSOR_THEME, Bibata-Modern-Amber
env = MOZ_ENABLE_WAYLAND,1

exec-once = alacritty-dropdown
exec-once = hyprpaper
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = systemctl --user start hyprpolkitagent



windowrule {
    name = dropdown-alacritty
    match:title = ^(dropdown-alacritty)$
    float = on
    size = 60% 50%
    move = 20% 5%
    opacity = 1.0 override 0.5 override 0.8 override
    workspace = special:dropdown-alacritty

}

windowrule {
    name = multimedia-tools
    match:class = ^(org.pulseaudio.pavucontrol|blueman-manager|com.gabm.satty)$
    float = on
    size = (monitor_w*0.5) (monitor_h*0.5)
    center = on
    opacity = 1.0 override 0.5 override 0.8 override
}

windowrule {
    name = apps
    match:class = ^(librewolf|zen|obsidian|org.pwmt.zathura)$
    opacity = 0.8
}

windowrule {
    name = wechat-media
    match:class = ^(wechat)$
    match:title = ^(Photos and Videos)$
    float = on
    size = (monitor_w*0.5) (monitor_h*0.5)
    center = on
    opacity = 1.0 override 0.5 override 0.8 override
}




exec-once=fcitx5 -d
exec-once=waybar
exec-once = swaybg -i /home/mys/Pictures/milky-way-starry-sky-night-mountains-lake-reflection-cold-5k-3840x2160-287.jpg -m fill

monitor=DP-1, 3840x2160, 0x0,1.5
monitor=eDP-1,1920x1080,2560x169,1

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 1
    mouse_refocus = true

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

xwayland {
    force_zero_scaling = true
}
env = GDK_SCALE,1.5

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border=true

    layout = master#master



}

group{
    groupbar{
        height=18
        font_size=18
        col.active = rgba(66f5c2e7) rgba(66F9E2AF) 90deg
        col.inactive = rgba(664D4D5A) rgba(667A6EAA) 45deg

    }
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    
    blur {
        enabled = false
        size = 3
        passes = 1
    }

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = master
}

binds {
    workspace_back_and_forth = false
    allow_workspace_cycles = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}



# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = ALT


bind =$SUPER SHIFT, h, movecurrentworkspacetomonitor, l
bind =$SUPER SHIFT, l, movecurrentworkspacetomonitor, r

bind = $SUPER, LEFT, layoutmsg, orientationleft
bind = $SUPER, RIGHT, layoutmsg, orientationright

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, alacritty
bind = $mainMod SHIFT, C, killactive, 
#bind = $mainMod SHIFT, e, exit, 
#bind = $mainMod, E, exec, dolphin
bind = $mainMod SHIFT, Space, togglefloating, 
# bind = $mainMod, I, exec, tofi-drun --drun-launch=true
bind = $mainMod, I, exec, fuzzel
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $SUPER SHIFT, F, fullscreen,0
# when maxisizing a window, indicatior.
windowrule = match:fullscreen 1, border_size 4
# bind = CONTROL, N, pass, class:^(librewolf)$


bind = $mainMod, G, togglegroup
bind = $mainMod, f, changegroupactive
bind = $mainMod SHIFT, G, moveoutofgroup
bind = $SUPER SHIFT, M, exec, netease-cloud-music-gtk4
bind = $mainMod, O, exec, librewolf
#bind = $mainMod, P, exec, firefox
bind = $SUPER, L, exec, hyprlock
bind = $mainMod Control_L, E, exec, proxychains4 -q fractal
bind = $mainMod Control_L, N, exec, obsidian --enable-features=UseOzonePlatform --ozone-platform=wayland --enable-wayland-ime 
bind = $mainMod SHIFT, q, exec, grim -g "`slurp`" - | satty -f -
bind = $mainMod, minus, togglespecialworkspace, dropdown-alacritty
bind = $mainMod SHIFT, minus, movetoworkspace, special:dropdown-alacritty
bind = $mainMod SHIFT, G, exec, http_proxy=http://127.0.0.1:8118 https_proxy=http://127.0.0.1:8118 steam
# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod, TAB,workspace,previous
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $SUPER, Q, workspace, 60 
bind = $SUPER, F, workspace, 61 # browser
bind = $SUPER, W, workspace, 62 # browser
bind = $SUPER, Z, workspace, 63 # zotero
bind = $SUPER, E, workspace, 64 # emessage
bind = $SUPER, D, workspace, 65 # Dict
bind = $SUPER, O, workspace, 66 # office
bind = $SUPER, B, workspace, 67 #book
bind = $SUPER, T, workspace, 69 
bind = $SUPER, M, workspace, 70 # music
bind = $SUPER, N, workspace, 71 # notebook
bind = $SUPER, S, workspace, 72 # steam
bind = $SUPER, P, workspace, 80 # temp
bind = $SUPER, V, workspace, 81 # virt
# addtional
bind = $SUPER, 1, workspace, 11
bind = $SUPER, 2, workspace, 12
bind = $SUPER, 3, workspace, 13
bind = $SUPER, 4, workspace, 14
bind = $SUPER, 5, workspace, 15
bind = $SUPER, 6, workspace, 16
bind = $SUPER, 7, workspace, 17
bind = $SUPER, 8, workspace, 18
bind = $SUPER, 9, workspace, 19

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# resize window
bind = $mainMod Control_L, h, resizeactive, -160 0
bind = $mainMod Control_L, l, resizeactive, 160 0
bind = $mainMod Control_L, k, resizeactive, 0 -160
bind = $mainMod Control_L, j, resizeactive, 0 160

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d




# for steam disable ALT
bind = ALT, F12, submap, disablebinds
submap = disablebinds
binde = , F12, submap, reset
submap = reset


